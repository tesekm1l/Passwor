<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        input[type="number"], input[type="checkbox"] {
            margin: 10px 0;
        }
        .password {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
            word-break: break-all;
        }
        button {
            padding: 10px 15px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Password Generator</h1>
    <label for="length">Password Length:</label>
    <input type="number" id="length" value="12" min="1" max="50"><br>
    <label><input type="checkbox" id="uppercase" checked> Include Uppercase Letters</label><br>
    <label><input type="checkbox" id="lowercase" checked> Include Lowercase Letters</label><br>
    <label><input type="checkbox" id="numbers" checked> Include Numbers</label><br>
    <label><input type="checkbox" id="symbols"> Include Symbols</label><br>
    <button id="generate">Generate Password</button>
    <button id="copy">Copy to Clipboard</button>
    <p class="password" id="password"></p>
    <script>
        document.getElementById('generate').addEventListener('click', function() {
            const length = +document.getElementById('length').value;
            const uppercase = document.getElementById('uppercase').checked;
            const lowercase = document.getElementById('lowercase').checked;
            const numbers = document.getElementById('numbers').checked;
            const symbols = document.getElementById('symbols').checked;

            const upperLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lowerLetters = 'abcdefghijklmnopqrstuvwxyz';
            const num = '0123456789';
            const sym = '!@#$%^&*()_+~`-=[]{}|;:",.<>?/';

            let passwordChars = '';
            if (uppercase) passwordChars += upperLetters;
            if (lowercase) passwordChars += lowerLetters;
            if (numbers) passwordChars += num;
            if (symbols) passwordChars += sym;

            if (passwordChars.length === 0) {
                alert('Please select at least one character type');
                return;
            }

            let password = '';
            for (let i = 0; i < length; i++) {
                password += passwordChars.charAt(Math.floor(Math.random() * passwordChars.length));
            }
            document.getElementById('password').textContent = password;
        });

        document.getElementById('copy').addEventListener('click', function() {
            const passwordText = document.getElementById('password').textContent;
            if (passwordText === '') {
                alert('Please generate a password first');
                return;
            }
            navigator.clipboard.writeText(passwordText).then(() => {
                alert('Password copied to clipboard!');
            });
        });
    </script>
</body>
</html>
